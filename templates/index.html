<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #13161e;
      --border:    #1f2330;
      --accent:    #00e5a0;
      --accent2:   #0094ff;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --user-bg:   #1a2740;
      --bot-bg:    #131a20;
      --radius:    14px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(13,15,20,0.85);
      backdrop-filter: blur(12px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-head);
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .btn-reset {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 7px 14px;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-reset:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Chat window ── */
    #chat-window {
      position: relative;
      z-index: 5;
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    #chat-window::-webkit-scrollbar { width: 4px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Welcome ── */
    .welcome {
      text-align: center;
      margin: auto;
      padding: 40px 20px;
      animation: fadeUp 0.5s ease both;
    }

    .welcome h2 {
      font-family: var(--font-head);
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .welcome p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 360px;
      margin: 0 auto 28px;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .suggestion {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-body);
    }

    .suggestion:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }

    /* ── Messages ── */
    .message {
      display: flex;
      gap: 12px;
      max-width: 780px;
      width: 100%;
      animation: fadeUp 0.3s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user  { margin-left: auto; flex-direction: row-reverse; }
    .message.bot   { margin-right: auto; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user .avatar {
      background: linear-gradient(135deg, var(--accent2), #005fa3);
    }

    .message.bot .avatar {
      background: linear-gradient(135deg, var(--accent), #008a60);
    }

    .bubble {
      padding: 13px 17px;
      border-radius: var(--radius);
      font-size: 0.93rem;
      line-height: 1.65;
      max-width: calc(100% - 50px);
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bg);
      border: 1px solid #1e3050;
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* code blocks inside bot messages */
    .bubble pre {
      background: #0a0c10;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin: 10px 0;
      overflow-x: auto;
      font-size: 0.83rem;
    }

    .bubble code {
      font-family: 'Courier New', monospace;
      font-size: 0.85em;
      background: rgba(255,255,255,0.07);
      padding: 2px 5px;
      border-radius: 4px;
    }

    .bubble pre code {
      background: none;
      padding: 0;
    }

    /* ── Typing indicator ── */
    .typing .bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s ease infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input bar ── */
    .input-bar {
      position: relative;
      z-index: 10;
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
      background: rgba(13,15,20,0.9);
      backdrop-filter: blur(12px);
    }

    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 780px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,160,0.08);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.93rem;
      resize: none;
      max-height: 140px;
      line-height: 1.5;
      padding: 2px 0;
    }

    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 38px; height: 38px;
      border-radius: 9px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0d0f14;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.15s;
    }

    #send-btn:hover  { opacity: 0.85; transform: scale(1.05); }
    #send-btn:active { transform: scale(0.96); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .input-hint {
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 8px;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 14px 16px; }
      #chat-window { padding: 20px 12px; }
      .input-bar { padding: 12px 12px 16px; }
      .welcome h2 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">🤖</div>
    AI Chatbot
  </div>
  <div class="status">
    <div class="status-dot"></div>
    Groq · llama-3.3-70b
  </div>
  <button class="btn-reset" onclick="resetChat()">↺ Reset</button>
</header>

<!-- Chat window -->
<div id="chat-window">
  <div class="welcome" id="welcome">
    <h2>How can I help?</h2>
    <p>Ask me anything — coding, writing, explanations, or just a conversation.</p>
    <div class="suggestions">
      <button class="suggestion" onclick="suggest(this)">What is machine learning?</button>
      <button class="suggestion" onclick="suggest(this)">Write a Python hello world</button>
      <button class="suggestion" onclick="suggest(this)">Explain REST APIs</button>
      <button class="suggestion" onclick="suggest(this)">How do I learn coding?</button>
    </div>
  </div>
</div>

<!-- Input bar -->
<div class="input-bar">
  <div class="input-wrap">
    <textarea id="user-input" rows="1" placeholder="Type a message…"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
  <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
</div>

<script>
  const chatWindow = document.getElementById('chat-window');
  const userInput  = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');

  // Auto-resize textarea
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
  });

  // Enter to send, Shift+Enter for newline
  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function suggest(btn) {
    userInput.value = btn.textContent;
    sendMessage();
  }

  function hideWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function appendMessage(role, text) {
    hideWelcome();
    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatText(text);

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatWindow.appendChild(msg);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return msg;
  }

  function showTyping() {
    hideWelcome();
    const msg = document.createElement('div');
    msg.className = 'message bot typing';
    msg.id = 'typing';
    msg.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>`;
    chatWindow.appendChild(msg);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function formatText(text) {
    // Basic markdown: code blocks, inline code, bold
    text = text
      .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
    return text;
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    appendMessage('user', text);
    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      removeTyping();
      appendMessage('bot', data.reply || data.error || 'Something went wrong.');
    } catch (err) {
      removeTyping();
      appendMessage('bot', '⚠️ Network error. Please try again.');
    } finally {
      sendBtn.disabled = false;
      userInput.focus();
    }
  }

  async function resetChat() {
    await fetch('/reset', { method: 'POST' });
    chatWindow.innerHTML = `
      <div class="welcome" id="welcome">
        <h2>How can I help?</h2>
        <p>Ask me anything — coding, writing, explanations, or just a conversation.</p>
        <div class="suggestions">
          <button class="suggestion" onclick="suggest(this)">What is machine learning?</button>
          <button class="suggestion" onclick="suggest(this)">Write a Python hello world</button>
          <button class="suggestion" onclick="suggest(this)">Explain REST APIs</button>
          <button class="suggestion" onclick="suggest(this)">How do I learn coding?</button>
        </div>
      </div>`;
  }

  userInput.focus();
</script>
</body>
</html>
